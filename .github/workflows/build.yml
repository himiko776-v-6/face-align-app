name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Debug Gradle wrapper
      run: |
        echo "=== Checking gradle-wrapper.jar ==="
        unzip -l gradle/wrapper/gradle-wrapper.jar
        echo "=== Checking settings.gradle.kts ==="
        cat settings.gradle.kts
        echo "=== Running Gradle ==="
    
    - name: Build APK
      run: ./gradlew :app:assembleDebug --no-daemon --no-build-cache --info
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk